    "crates/cluster_manager",
    "crates/ai_gateway",
    "crates/autoscaler",
    "crates/deployment",
    "crates/reranker",
    "crates/retriever",
    "crates/embedding",
    "crates/dataset",
    "crates/cost_router",
    "crates/runtime_profiler",
    "crates/resource_scheduler",
    "crates/gpu_manager",
    "crates/leaderboard",
    "crates/evaluation",
    "crates/module_registry",
    "crates/ota_update",
    "crates/edge_runtime",
    "crates/observability",
    "crates/autoscaling",
    "crates/distributed_queue",
