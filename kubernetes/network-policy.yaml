apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: aiot-network-policy
  namespace: aiot-system
spec:
  podSelector:
    matchLabels:
      app: aiot
  policyTypes:
    - Ingress
    - Egress
  ingress:
    - from:
        - namespaceSelector:
            matchLabels:
              name: ingress-nginx
      ports:
        - protocol: TCP
          port: 8080
  egress:
    - to:
        - namespaceSelector:
            matchLabels:
              name: database-system
      ports:
        - protocol: TCP
          port: 5432
